  const loading = document.getElementById('__bundler_loading');

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tone 7548 C · Yellow */\n  --color-logo-O:   #2E5914;  /* O · Pantone 350 C · Green (primary) */\n  --color-logo-Q:   #4D1761;  /* Q · Pantone 2617 C · Purple */\n  --color-logo-U:   #FDC300;  /* U · Pantone 7548 C · Yellow */\n  --color-logo-I2:  #009FE3;  /* I (second) · Pantone 299 C · Sky Blue */\n  --color-logo-A2:  #95C11F;  /* A (last) · Pantone 368 C · Lime */\n\n  /* Neutrals */\n  --color-neutral-100: #EFEFEF;   /* Slide backgrounds */\n  --color-neutral-200: #E0E0E0;\n  --color-neutral-300: #C8C8C8;\n  --color-neutral-600: #666666;\n  --color-neutral-800: #222222;\n  --color-white:       #FFFFFF;\n\n  /* ── SEMANTIC COLORS ──────────────────────────────────────── */\n  --color-primary:        #2E5914;  /* Pantone 350 C */\n  --color-primary-dark:   #1A340B;\n  --color-accent:         #95C11F;  /* Pantone 368 C */\n  --color-dark-bg:        var(--color-navy-800);\n  --color-surface:        var(--color-neutral-100);\n  --color-text-primary:   var(--color-navy-800);\n  --color-text-secondary: var(--color-neutral-600);\n  --color-text-on-dark:   var(--color-white);\n\n  /* ── TYPOGRAPHY ───────────────────────────────────────────── */\n  --font-display:  'Montserrat', sans-serif;  /* Use weight 900 for display */\n  --font-body:     'Montserrat', sans-serif;  /* Use weight 400–600 for body */\n\n  --font-weight-black:      900;\n  --font-weight-extrabold:  800;\n  --font-weight-bold:       700;\n  --font-weight-semibold:   600;\n  --font-weight-medium:     500;\n  --font-weight-regular:    400;\n\n  /* Type scale */\n  --text-xs:   0.75rem;   /* 12px */\n  --text-sm:   0.875rem;  /* 14px */\n  --text-base: 1rem;      /* 16px */\n  --text-lg:   1.125rem;  /* 18px */\n  --text-xl:   1.25rem;   /* 20px */\n  --text-2xl:  1.5rem;    /* 24px */\n  --text-3xl:  1.875rem;  /* 30px */\n  --text-4xl:  2.25rem;   /* 36px */\n  --text-5xl:  3rem;      /* 48px */\n  --text-6xl:  3.75rem;   /* 60px */\n  --text-7xl:  4.5rem;    /* 72px */\n\n  /* Line heights */\n  --leading-tight:  1.1;\n  --leading-snug:   1.25;\n  --leading-normal: 1.5;\n\n  /* Letter spacing */\n  --tracking-tight:   -0.02em;\n  --tracking-normal:  0em;\n  --tracking-wide:    0.05em;\n  --tracking-widest:  0.15em;\n\n  /* ── SPACING ──────────────────────────────────────────────── */\n  --space-1:  0.25rem;\n  --space-2:  0.5rem;\n  --space-3:  0.75rem;\n  --space-4:  1rem;\n  --space-6:  1.5rem;\n  --space-8:  2rem;\n  --space-10: 2.5rem;\n  --space-12: 3rem;\n  --space-16: 4rem;\n  --space-20: 5rem;\n  --space-24: 6rem;\n\n  /* ── BORDERS & RADIUS ─────────────────────────────────────── */\n  --radius-sm:   4px;\n  --radius-md:   8px;\n  --radius-lg:   16px;\n  --radius-full: 9999px;\n\n  /* ── SHADOWS ──────────────────────────────────────────────── */\n  --shadow-sm:  0 1px 3px rgba(0,0,0,0.12);\n  --shadow-md:  0 4px 16px rgba(0,0,0,0.12);\n  --shadow-lg:  0 8px 32px rgba(0,0,0,0.16);\n\n  /* ── TRANSITIONS ──────────────────────────────────────────── */\n  --transition-fast:   150ms ease;\n  --transition-base:   250ms ease;\n  --transition-slow:   400ms ease;\n}\n\n/* ── SEMANTIC ELEMENT STYLES ──────────────────────────────── */\n\nh1, .h1 {\n  font-family: var(--font-display);\n  font-weight: var(--font-weight-black);\n  font-size: var(--text-6xl);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--color-text-primary);\n  text-transform: uppercase;\n}\n\nh2, .h2 {\n  font-family: var(--font-display);\n  font-weight: var(--font-weight-black);\n  font-size: var(--text-4xl);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-wide);\n  color: var(--color-text-primary);\n  text-transform: uppercase;\n}\n\nh3, .h3 {\n  font-family: var(--font-display);\n  font-weight: var(--font-weight-bold);\n  font-size: var(--text-2xl);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-normal);\n  color: var(--color-text-primary);\n}\n\nh4, .h4 {\n  font-family: var(--font-display);\n  font-weight: var(--font-weight-semibold);\n  font-size: var(--text-lg);\n  line-height: var(--leading-snug);\n  color: var(--color-text-primary);\n}\n\np, .body {\n  font-family: var(--font-body);\n  font-weight: var(--font-weight-regular);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  color: var(--color-text-primary);\n}\n\n.body-sm {\n  font-family: var(--font-body);\n  font-weight: var(--font-weight-regular);\n  font-size: var(--text-sm);\n  line-height: var(--leading-normal);\n  color: var(--color-text-secondary);\n}\n\n.label {\n  font-family: var(--font-display);\n  font-weight: var(--font-weight-bold);\n  font-size: var(--text-xs);\n  letter-spacing: var(--tracking-widest);\n  text-transform: uppercase;\n  color: var(--color-text-secondary);\n}\n\n.caption {\n  font-family: var(--font-body);\n  font-weight: var(--font-weight-medium);\n  font-size: var(--text-sm);\n  color: var(--color-text-secondary);\n}\n\ncode, .mono {\n  font-family: 'Courier New', Courier, monospace;\n  font-size: var(--text-sm);\n  background: var(--color-neutral-200);\n  padding: 0.15em 0.4em;\n  border-radius: var(--radius-sm);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Visit Antioquia · Portafolio\n   Magazine editorial layout. Each experience owns one of the 9\n   logo colors via --exp-color on its article.\n   ============================================================ */\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  font-family: var(--font-body);\n  background: var(--color-neutral-100);\n  color: var(--color-text-primary);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n  overflow-x: hidden;\n}\n\nimg { display: block; max-width: 100%; }\n\n/* Display font variant */\nbody[data-display=\"condensed\"] {\n  --font-display: 'Montserrat', 'Impact', sans-serif;\n}\nbody[data-display=\"condensed\"] .hero__title,\nbody[data-display=\"condensed\"] .exp__title,\nbody[data-display=\"condensed\"] .map__title,\nbody[data-display=\"condensed\"] .intro__title,\nbody[data-display=\"condensed\"] .closing__title {\n  font-stretch: 75%;\n  letter-spacing: -0.03em;\n}\n\n/* ============================================================\n   UTILITIES\n   ============================================================ */\n.kicker {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: 0.75rem;\n  letter-spacing: 0.25em;\n  text-transform: uppercase;\n  color: var(--color-forest-700);\n  margin-bottom: 1rem;\n}\n\n/* ============================================================\n   NAV\n   ============================================================ */\n.nav {\n  position: sticky;\n  top: 0;\n  z-index: 100;\n  background: rgba(255,255,255,0.92);\n  backdrop-filter: blur(14px);\n  -webkit-backdrop-filter: blur(14px);\n  border-bottom: 1px solid rgba(0,0,0,0.06);\n}\n.nav__inner {\n  max-width: 1400px;\n  margin: 0 auto;\n  padding: 0 2rem;\n  height: 72px;\n  display: flex;\n  align-items: center;\n  gap: 2rem;\n}\n.nav__logo img {\n  height: 44px;\n  object-fit: contain;\n}\n.nav__links {\n  list-style: none;\n  display: flex;\n  gap: 2rem;\n  flex: 1;\n}\n.nav__links a {\n  color: var(--color-text-primary);\n  text-decoration: none;\n  font-weight: 600;\n  font-size: 0.95rem;\n  position: relative;\n  padding: 0.4rem 0;\n}\n.nav__links a:hover { color: var(--color-forest-700); }\n.nav__links a::after {\n  content: '';\n  position: absolute;\n  left: 0;\n  bottom: 0;\n  height: 2px;\n  width: 0;\n  background: var(--color-lime-500);\n  transition: width 0.25s ease;\n}\n.nav__links a:hover::after { width: 100%; }\n.nav__cta {\n  background: var(--color-forest-700);\n  color: var(--color-white);\n  padding: 0.7rem 1.5rem;\n  border-radius: var(--radius-full);\n  text-decoration: none;\n  font-weight: 700;\n  font-size: 0.8rem;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  transition: background var(--transition-base);\n}\n.nav__cta:hover { background: var(--color-forest-800); }\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.hero {\n  position: relative;\n  min-height: 92vh;\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n  overflow: hidden;\n  background: var(--color-navy-900);\n  isolation: isolate;\n}\n.hero__media { position: absolute; inset: 0; }\n.hero__img {\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  filter: brightness(0.55) saturate(1.1);\n}\n.hero__scrim {\n  position: absolute; inset: 0;\n  background:\n    linear-gradient(180deg, rgba(10,18,24,0.55) 0%, rgba(10,18,24,0.25) 35%, rgba(10,18,24,0.85) 100%),\n    linear-gradient(110deg, rgba(46,89,20,0.35) 0%, rgba(0,0,0,0) 60%);\n}\n/* subtle ethnic-pattern overlay */\n.hero__pattern {\n  position: absolute; inset: 0;\n  opacity: 0.18;\n  background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'><g fill='none' stroke='%23ffffff' stroke-width='1.2'><circle cx='60' cy='60' r='28'/><path d='M60 6 L60 114 M6 60 L114 60 M22 22 L98 98 M98 22 L22 98'/><path d='M60 28 L72 60 L60 92 L48 60 Z'/><\u002Fg><\u002Fsvg>\");\n  background-size: 120px 120px;\n  mix-blend-mode: overlay;\n  pointer-events: none;\n}\nbody[data-pattern=\"off\"] .hero__pattern { display: none; }\nbody[data-pattern=\"bold\"] .hero__pattern { opacity: 0.32; }\n\n.hero__bracket {\n  position: absolute;\n  width: 90px;\n  height: auto;\n  filter: brightness(0) invert(1);\n  opacity: 0.7;\n  z-index: 2;\n}\n.hero__bracket--tl { top: 28px; left: 28px; }\n.hero__bracket--br { bottom: 28px; right: 28px; }\n\n.hero__content {\n  position: relative;\n  z-index: 3;\n  max-width: 1400px;\n  width: 100%;\n  margin: 0 auto;\n  padding: 6rem 2rem 4rem;\n  color: var(--color-white);\n}\n.hero__kicker {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.7rem;\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: 0.8rem;\n  letter-spacing: 0.25em;\n  text-transform: uppercase;\n  color: var(--color-lime-500);\n  margin-bottom: 2rem;\n}\n.hero__kicker .dot {\n  width: 10px; height: 10px; border-radius: 50%;\n  background: var(--color-lime-500);\n  box-shadow: 0 0 16px var(--color-lime-500);\n  animation: pulse 2s infinite;\n}\n@keyframes pulse {\n  0%, 100% { opacity: 1; transform: scale(1); }\n  50%      { opacity: 0.5; transform: scale(0.85); }\n}\n\n.hero__title {\n  font-family: var(--font-display);\n  font-weight: 900;\n  font-size: clamp(2.8rem, 8vw, 7.5rem);\n  line-height: 0.92;\n  letter-spacing: -0.025em;\n  text-transform: uppercase;\n  margin-bottom: 2rem;\n  max-width: 1100px;\n  color: var(--color-white);\n}\n.hero__title-line { display: block; }\n.hero__title-line--logo {\n  display: block;\n  margin-top: 0.4rem;\n  font-size: clamp(3.4rem, 10vw, 9rem);\n  letter-spacing: -0.02em;\n  line-height: 0.95;\n  filter: drop-shadow(0 4px 24px rgba(0,0,0,0.35));\n}\n.hero__title-line--logo span {\n  display: inline-block;\n  transition: transform 0.3s ease;\n}\n.hero__title-line--logo:hover span {\n  transform: translateY(-4px) rotate(-2deg);\n}\n.hero__title-line--logo:hover span:nth-child(2n) {\n  transform: translateY(-4px) rotate(2deg);\n}\n\n.hero__sub {\n  font-size: clamp(1.05rem, 1.4vw, 1.35rem);\n  max-width: 640px;\n  color: rgba(255,255,255,0.88);\n  margin-bottom: 3rem;\n  line-height: 1.55;\n}\n\n.hero__meta {\n  display: flex;\n  gap: 3rem;\n  flex-wrap: wrap;\n}\n.hero__meta-item {\n  display: flex;\n  flex-direction: column;\n  gap: 0.3rem;\n}\n.hero__meta-num {\n  font-family: var(--font-display);\n  font-weight: 900;\n  font-size: clamp(2rem, 3.5vw, 3.2rem);\n  line-height: 1;\n  color: var(--color-lime-500);\n}\n.hero__meta-label {\n  font-size: 0.78rem;\n  text-transform: uppercase;\n  letter-spacing: 0.2em;\n  color: rgba(255,255,255,0.7);\n}\n\n.hero__scroll {\n  position: absolute;\n  bottom: 2rem;\n  left: 50%;\n  transform: translateX(-50%);\n  color: var(--color-white);\n  text-decoration: none;\n  font-size: 0.75rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  font-weight: 700;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 0.5rem;\n  z-index: 3;\n}\n.hero__scroll-arrow {\n  font-size: 1.5rem;\n  animation: bob 2s ease-in-out infinite;\n}\n@keyframes bob {\n  0%, 100% { transform: translateY(0); }\n  50% { transform: translateY(8px); }\n}\n\n/* ============================================================\n   INTRO / EDITORIAL\n   ============================================================ */\n.intro {\n  background: var(--color-white);\n  padding: 7rem 2rem;\n}\n.intro__inner {\n  max-width: 1300px;\n  margin: 0 auto;\n  display: grid;\n  grid-template-columns: 1.4fr 1fr;\n  gap: 5rem;\n  align-items: start;\n}\n.intro__title {\n  font-family: var(--font-display);\n  font-weight: 900;\n  font-size: clamp(2.4rem, 4.5vw, 4.5rem);\n  line-height: 1;\n  text-transform: uppercase;\n  color: var(--color-navy-800);\n  margin-bottom: 2rem;\n  letter-spacing: -0.02em;\n}\n.intro__title em {\n  font-style: italic;\n  font-weight: 900;\n  color: var(--color-forest-700);\n  background: linear-gradient(180deg, transparent 60%, var(--color-lime-300) 60%);\n  padding: 0 0.1em;\n}\n.intro__lead {\n  font-size: 1.2rem;\n  line-height: 1.65;\n  color: var(--color-navy-800);\n  margin-bottom: 1.5rem;\n  text-wrap: pretty;\n}\n.intro__body {\n  font-size: 1.02rem;\n  line-height: 1.7;\n  color: var(--color-neutral-600);\n  text-wrap: pretty;\n}\n.intro__body strong {\n  color: var(--color-forest-700);\n  font-weight: 800;\n}\n.intro__right {\n  display: flex;\n  flex-direction: column;\n  gap: 0.6rem;\n  border-left: 2px solid var(--color-neutral-200);\n  padding-left: 2rem;\n}\n.intro__chip {\n  display: flex;\n  align-items: baseline;\n  gap: 1rem;\n  font- nt-size: 0.7rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--color-neutral-600);\n  margin-bottom: 0.6rem;\n}\n.tweaks__segmented {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 4px;\n  background: var(--color-neutral-100);\n  padding: 4px;\n  border-radius: var(--radius-md);\n}\n.tweaks__segmented[data-control=\"display\"] {\n  grid-template-columns: 1fr 1fr;\n}\n.tweaks__segmented button {\n  border: none;\n  background: transparent;\n  padding: 0.55rem 0.4rem;\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: 0.72rem;\n  color: var(--color-neutral-600);\n  cursor: pointer;\n  border-radius: var(--radius-sm);\n  letter-spacing: 0.04em;\n  transition: all var(--transition-fast);\n}\n.tweaks__segmented button.is-active {\n  background: var(--color-white);\n  color: var(--color-forest-700);\n  box-shadow: var(--shadow-sm);\n}\n\n/* ============================================================\n   PALETTE TWEAKS\n   ============================================================ */\nbody[data-palette=\"forest\"] {\n  --color-logo-A1: #4D8A28;\n  --color-logo-N:  #6FAD45;\n  --color-logo-T:  #2E5914;\n  --color-logo-I1: #95C11F;\n  --color-logo-O:  #2E5914;\n  --color-logo-Q:  #1A340B;\n  --color-logo-U:  #C8DE7F;\n  --color-logo-I2: #4D8A28;\n  --color-logo-A2: #95C11F;\n}\nbody[data-palette=\"navy\"] {\n  --color-logo-A1: #264457;\n  --color-logo-N:  #1C3040;\n  --color-logo-T:  #13222B;\n  --color-logo-I1: #95C11F;\n  --color-logo-O:  #2E5914;\n  --color-logo-Q:  #0A1218;\n  --color-logo-U:  #4D8A28;\n  --color-logo-I2: #264457;\n  --color-logo-A2: #95C11F;\n}\n\n/* ============================================================\n   RESPONSIVE\n   ============================================================ */\n@media (max-width: 1024px) {\n  .intro__inner { grid-template-columns: 1fr; gap: 3rem; }\n  .intro__right { border-left: none; padding-left: 0; border-top: 2px solid var(--color-neutral-200); pa >\n  <div class=\"hero__media\">\n    <img src=\"https://drive.google.com/thumbnail?id=1Zopa2E3VhSZXrehOiXrKwvJ4VC-PGWjw&amp;sz=w1800\" alt=\"\" class=\"hero__img\">\n    <div class=\"hero__scrim\"><\u002Fdiv>\n    <div class=\"hero__pattern\" aria-hidden=\"true\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <img src=\"6bf0d419-9743-45e3-befc-e84578d7d489\" alt=\"\" class=\"hero__bracket hero__bracket--tl\">\n  <img src=\"fb3a1b08-ee0c-40dc-a02a-738851e1941e\" alt=\"\" class=\"hero__bracket hero__bracket--br\">\n\n  <div class=\"hero__content\">\n    <div class=\"hero__kicker\">\n      <span class=\"dot\"><\u002Fspan> Portafolio 2026 · Visit Antioquia\n    <\u002Fdiv>\n    <h1 class=\"hero__title\">\n      <span class=\"hero__title-line\">Nueve colores.<\u002Fspan>\n      <span class=\"hero__title-line\">Una sola<\u002Fspan>\n      <span class=\"hero__title-line hero__title-line--logo\" aria-label=\"Antioquia\">\n        <span style=\"color:var(--color-logo-A1)\">A<\u002Fspan><span style=\"color:var(--color-logo-N)\">N<\u002Fspan><span style=\"color:var(--color-logo-T)\">T<\u002Fspan><span style=\"color:var(--color-logo-I1)\">I<\u002Fspan><span style=\"color:var(--color-logo-O)\">O<\u002Fspan><span style=\"color:var(--color-logo-Q)\">Q<\u002Fspan><span style=\"color:var(--color-logo-U)\">U<\u002Fspan><span style=\"color:var(--color-logo-I2)\">I<\u002Fspan><span style=\"color:var(--color-logo-A2)\">A<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fh1>\n    <p class=\"hero__sub\">\n      Seis experiencias auténticas, operadas por proveedores locales,\n      para descubrir el departamento que vive en cada letra de nuestro logo.\n    <\u002Fp>\n    <div class=\"hero__meta\">\n      <div class=\"hero__meta-item\">\n        <span class=\"hero__meta-num\">06<\u002Fspan>\n        <span class=\"hero__meta-label\">Experiencias curadas<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero__meta-item\">\n        <span class=\"hero__meta-num\">09<\u002Fspan>\n        <span class=\"hero__meta-label\">Subregiones<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"hero__meta-item\">\n        <span class=\"hero__meta-num\">∞<\u002Fspan>\n        <span class=\"hero__meta-label\">Historias por contar<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <a href=\"#intro\" class=\"hero__scroll\">\n    <span>Empieza el recorrido<\u002Fspan>\n    <span class=\"hero__scroll-arrow\">↓<\u002Fspan>\n  <\u002Fa>\n<\u002Fheader>\n\n<!-- ============ INTRO / EDITORIAL ============ -->\n<section class=\"intro\" id=\"intro\">\n  <div class=\"intro__inner\">\n    <div class=\"intro__left\">\n      <div class=\"kicker\">Carta editorial<\u002Fdiv>\n      <h2 class=\"intro__title\">\n        Hacer <em>visible<\u002Fem> lo invisible.\n      <\u002Fh2>\n      <p class=\"intro__lead\">\n        Cada experiencia de este portafolio fue elegida porque cuenta\n        una verdad de Antioquia que los catálogos genéricos no se atreven a contar:\n        la transformación de la Comuna 13, el ritual del café en una vereda\n        de San Antonio de Prado, el silencio de las abejas sin aguijón,\n        el vértigo del parapente sobre el Valle de Aburrá.\n      <\u002Fp>\n      <p class=\"intro__body\">\n        Hemos asignado a cada experiencia un color de las nueve letras de\n        <strong>ANTIOQUIA<\u002Fstrong>. No es decoración: es una promesa de que viajar con nosotros\n        significa recorrer un territorio multicolor, multicultural y multidimensional.\n      <\u002Fp>\n    <\u002Fdiv>\n    <aside class=\"intro__right\">\n      <div class=\"intro__chip\"><span>01<\u002Fspan>City Tour + Comuna 13<\u002Fdiv>\n      <div class=\"intro__chip\"><span>02<\u002Fspan>Jardín y Jericó<\u002Fdiv>\n      <div class=\"intro__chip\"><span>03<\u002Fspan>Full Day Guatapé<\u002Fdiv>\n      <div class=\"intro__chip\"><span>04<\u002Fspan>Vuelo en Parapente<\u002Fdiv>\n      <div class=\"intro__chip\"><span>05<\u002Fspan>Bicicleta + Café<\u002Fdiv>\n      <div class=\"intro__chip\"><span>06<\u002Fspan>Un Día con las Abejas<\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SUBREGIONES MAP ============ -->\n<section class=\"map\" id=\"subregiones\">\n  <div class=\"map__inner\">\n    <div class=\"map__head\">\n      <div class=\"kicker\">El territorio<\u002Fdiv>\n      <h2 class=\"map__title\">Nueve subregiones,<br>nueve colores.<\u002Fh2>\n      <p class=\"map__lead\">\n        El logo de Visit Antioquia no es solo tipografía: cada letra\n        representa una de las nueve subregiones del departamento, con un\n        patrón étnico y un color únicos.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"map__viz\">\n      <!-- Stylised abstract map of Antioquia split into 9 subregions -->\n      <svg viewBox=\"0 0 640 720\" class=\"map__svg\" xmlns=\"http://www.w3.org/2000/svg\" aria-label=\"Mapa de Antioquia y sus 9 subregiones\">\n        <defs>\n          <filter id=\"mapShadow\" x=\"-10%\" y=\"-10%\" width=\"120%\" height=\"120%\">\n            <feDropShadow dx=\"0\" dy=\"6\" stdDeviation=\"10\" flood-opacity=\"0.18\"><\u002FfeDropShadow>\n          <\u002Ffilter>\n        <\u002Fdefs>\n        <g filter=\"url(#mapShadow)\">\n          <!-- Urabá NW -->\n          <path d=\"M40,140 L160,80 L240,160 L210,260 L100,280 Z\" fill=\"var(--color-logo-A1)\" class=\"map__region\" data-name=\"Urabá\" data-letter=\"A\"><\u002Fpath>\n          <!-- Occidente W -->\n          <path d=\"M100,280 L210,260 L240,360 L180,440 L80,400 Z\" fill=\"var(--color-logo-N)\" class=\"map__region\" data-name=\"Occidente\" data-letter=\"N\"><\u002Fpath>\n          <!-- Norte N -->\n          <path d=\"M240,160 L380,140 L420,260 L320,300 L210,260 Z\" fill=\"var(--color-logo-T)\" class=\"map__region\" data-name=\"Norte\" data-letter=\"T\"><\u002Fpath>\n          <!-- Bajo Cauca NE -->\n          <path d=\"M380,140 L540,180 L560,300 L460,300 L420,260 Z\" fill=\"var(--color-logo-I1)\" class=\"map__region\" data-name=\"Bajo Cauca\" data-lette
